name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: g++
            label: Linux GCC
          - os: ubuntu-latest
            compiler: clang++
            label: Linux Clang
          - os: macos-latest
            compiler: clang++
            label: macOS Clang

    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM/Clang (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.compiler == 'clang++'
        run: sudo apt-get install -y clang

      - name: Build
        run: make CXX=${{ matrix.compiler }}

      - name: Smoke test (3 self-play games)
        run: ./checkers --self 3
